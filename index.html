    <!-- Tailwind CSS -->

        tailwind.config = {

                extend: {

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Anime.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>

    <style>
        body { background-color: #0a0a0a; color: #f5f5f5; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-nav { background: rgba(23, 23, 23, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .camera-container video { object-fit: cover; width: 100%; height: 100%; }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }
    </style>

    <!-- Script untuk Inject Manifest PWA (Single File Solution) -->
    <script>
        const manifest = {
            "name": "Barbermark Absensi",
            "short_name": "Barbermark",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#0a0a0a",
            "theme_color": "#dc2626",
            "icons": [
                {
                    "src": "https://cdn-icons-png.flaticon.com/512/930/930791.png",
                    "sizes": "192x192",
                    "type": "image/png"
                },
                {
                    "src": "https://cdn-icons-png.flaticon.com/512/930/930791.png",
                    "sizes": "512x512",
                    "type": "image/png"
                }
            ]
        };
        const stringManifest = JSON.stringify(manifest);
        const blob = new Blob([stringManifest], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(blob);
        const link = document.createElement('link');
        link.rel = 'manifest';
        link.href = manifestURL;
        document.head.appendChild(link);
    </script>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCkZvcc0WLZtdLa8Qgk3Ey_qqeEi4g9OXQ",
            authDomain: "barbermark-80fd4.firebaseapp.com",
            projectId: "barbermark-80fd4",
            storageBucket: "barbermark-80fd4.firebasestorage.app",
            messagingSenderId: "849783749557",
            appId: "1:849783749557:web:01bf655ae9e6deeb76f7fc",
            measurementId: "G-8DJDE2J6Q6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'barbermark-app';

        window.firebaseDeps = { auth, db, provider, signInWithPopup, onAuthStateChanged, signOut, updateProfile, collection, onSnapshot, addDoc, doc, setDoc, getDoc, appId };
    </script>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef } = React;

        // --- Helper Cloudinary ---
        const uploadToCloudinary = async (fileOrBase64) => {
            const url = "https://api.cloudinary.com/v1_1/dl6iyeqrc/auto/upload";
            const formData = new FormData();
            formData.append('file', fileOrBase64);
            formData.append('upload_preset', 'barbermark');

            const response = await fetch(url, { method: 'POST', body: formData });
            const data = await response.json();
            if (data.secure_url) {
                return { url: data.secure_url, type: data.resource_type };
            } else {
                throw new Error(data.error?.message || "Upload gagal");
            }
        };

        // --- Ikon SVG ---
        const Icons = {
            Chat: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>,
            Camera: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"></path><circle cx="12" cy="13" r="3"></circle></svg>,
            User: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>,
            Send: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>,
            Image: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>,
            LogOut: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>,
            Reply: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 17 4 12 9 7"></polyline><path d="M20 18v-2a4 4 0 0 0-4-4H4"></path></svg>,
            Edit: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>,
            Close: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>,
            Download: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        };

        // --- Komponen Login ---
        const Login = ({ onLogin }) => {
            return (
                <div className="flex flex-col items-center justify-center min-h-screen bg-barber-black p-4">
                    <div className="bg-barber-dark p-8 rounded-2xl shadow-2xl border border-gray-800 text-center max-w-sm w-full animate-float">
                        <div className="w-24 h-24 mx-auto mb-6 flex items-center justify-center">
                            <img 
                                src="https://cdn-icons-png.flaticon.com/512/930/930791.png" 
                                alt="Barbermark Logo" 
                                className="w-full h-full object-contain drop-shadow-[0_0_15px_rgba(220,38,38,0.6)]"
                            />
                        </div>
                        <h1 className="text-3xl font-bold text-white mb-2 tracking-tight">Barbermark</h1>
                        <p className="text-gray-400 mb-8 text-sm">Sistem Absensi & Komunikasi</p>
                        
                        <button 
                            onClick={onLogin}
                            className="w-full bg-white text-black font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-3 hover:bg-gray-200 transition-colors"
                        >
                            <svg className="w-5 h-5" viewBox="0 0 24 24">
                                <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                            </svg>
                            Login dengan Google
                        </button>
                    </div>
                </div>
            );
        };

        // --- Komponen Kamera (Absensi) ---
        const CameraPage = ({ user, db, addDoc, collection, doc, setDoc, appId, onNavChange }) => {
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const [location, setLocation] = useState("Mencari lokasi...");
            const [currentTime, setCurrentTime] = useState(new Date());
            const [isCaptured, setIsCaptured] = useState(false);
            const [photoData, setPhotoData] = useState(null);
            const [statusMsg, setStatusMsg] = useState("");
            const [stream, setStream] = useState(null);
            const [userRole, setUserRole] = useState("Staff");

            useEffect(() => {
                const fetchRole = async () => {
                    try {
                        const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'info', 'public');
                        const docSnap = await getDoc(docRef);
                        if (docSnap.exists() && docSnap.data().jobTitle) {
                            setUserRole(docSnap.data().jobTitle);
                        }
                    } catch(e) { console.log("No role set yet"); }
                };
                fetchRole();
            }, [user, db, appId]);

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                if ("geolocation" in navigator) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            setLocation(`Lat: ${position.coords.latitude.toFixed(4)}, Lng: ${position.coords.longitude.toFixed(4)}`);
                        },
                        () => setLocation("Lokasi tidak diizinkan/gagal")
                    );
                }
            }, []);

            useEffect(() => {
                const startCamera = async () => {
                    try {
                        const mediaStream = await navigator.mediaDevices.getUserMedia({ 
                            video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } } 
                        });
                        setStream(mediaStream);
                        if (videoRef.current) videoRef.current.srcObject = mediaStream;
                    } catch (err) {
                        setStatusMsg("Gagal mengakses kamera: " + err.message);
                    }
                };
                startCamera();
                return () => { if (stream) stream.getTracks().forEach(track => track.stop()); };
            }, []);

            const determineAttendanceType = (date) => {
                const hour = date.getHours();
                const minute = date.getMinutes();
                // Logika: Lebih dari 10:10
                const isLate = (hour === 10 && minute > 10) || (hour > 10 && hour < 12);

                if (hour >= 4 && !isLate && hour < 12) return { text: "ABSEN MASUK", type: "masuk", color: "#10b981" };
                if (isLate && hour < 12) return { text: "TERLAMBAT", type: "terlambat", color: "#eab308" };
                return { text: "ABSEN PULANG", type: "pulang", color: "#3b82f6" };
            };

            const takePhoto = async () => {
                if (!videoRef.current || !canvasRef.current) return;
                
                const video = videoRef.current;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');

                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                const dateStr = currentTime.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                const timeStr = currentTime.toLocaleTimeString('id-ID');
                const attType = determineAttendanceType(currentTime);

                ctx.fillStyle = "rgba(0, 0, 0, 0.5)";
                ctx.fillRect(0, canvas.height - 120, canvas.width, 120);

                ctx.font = "bold 36px Arial";
                ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
                ctx.textAlign = "right";
                ctx.fillText("BARBERMARK", canvas.width - 20, canvas.height - 70);
                
                ctx.font = "20px Arial";
                ctx.fillStyle = "white";
                ctx.fillText(`${dateStr} - ${timeStr}`, canvas.width - 20, canvas.height - 40);
                ctx.fillText(location, canvas.width - 20, canvas.height - 15);

                ctx.fillStyle = attType.color;
                ctx.fillRect(20, 20, 220, 50);
                ctx.fillStyle = "white";
                ctx.font = "bold 22px Arial";
                ctx.textAlign = "center";
                ctx.fillText(attType.text, 130, 53);

                ctx.fillStyle = "rgba(0,0,0,0.6)";
                ctx.fillRect(20, 80, 220, 50);
                ctx.fillStyle = "white";
                ctx.font = "bold 16px Arial";
                ctx.fillText(user.displayName, 130, 100);
                ctx.font = "14px Arial";
                ctx.fillStyle = "#ccc";
                ctx.fillText(userRole, 130, 120);

                const base64Image = canvas.toDataURL('image/jpeg', 0.6);
                setPhotoData(base64Image);
                setIsCaptured(true);

                if (stream) stream.getTracks().forEach(track => track.stop());

                try {
                    setStatusMsg("Mengunggah foto ke Cloudinary...");
                    const cloudRes = await uploadToCloudinary(base64Image);
                    setStatusMsg("Menyimpan data absensi...");
                    
                    const publicRef = collection(db, 'artifacts', appId, 'public', 'data', 'chats');
                    await addDoc(publicRef, {
                        roomId: 'absensi',
                        imageUrl: cloudRes.url,
                        senderName: user.displayName,
                        senderRole: userRole,
                        senderPhoto: user.photoURL,
                        senderUid: user.uid,
                        timestamp: currentTime.toISOString(),
                        type: attType.type,
                        text: `${attType.text} - ${timeStr}`
                    });

                    const dateKey = currentTime.toISOString().split('T')[0];
                    const privateRef = doc(db, 'artifacts', appId, 'users', user.uid, 'attendance', dateKey);
                    await setDoc(privateRef, {
                        date: dateKey,
                        type: attType.type,
                        timestamp: currentTime.toISOString()
                    }, { merge: true });

                    setStatusMsg("Absensi Berhasil!");
                    setTimeout(() => { onNavChange('chat'); }, 2000);

                } catch (error) {
                    console.error(error);
                    setStatusMsg("Gagal menyimpan data.");
                }
            };

            return (
                <div className="relative h-screen w-full bg-black flex flex-col items-center justify-center overflow-hidden pb-24 md:pb-0">
                    {!isCaptured ? (
                        <>
                            <video ref={videoRef} autoPlay playsInline muted className="absolute inset-0 w-full h-full object-cover"></video>
                            
                            <div className="absolute top-6 left-6 flex flex-col gap-2 z-10">
                                <div className={`px-4 py-2 text-white font-bold rounded shadow-lg ${determineAttendanceType(currentTime).type === 'masuk' ? 'bg-emerald-500' : determineAttendanceType(currentTime).type === 'terlambat' ? 'bg-yellow-500' : 'bg-blue-500'}`}>
                                    {determineAttendanceType(currentTime).text}
                                </div>
                                <div className="bg-black/60 px-4 py-2 text-white text-sm rounded backdrop-blur-sm w-max border-l-4 border-barber-red">
                                    <div className="font-bold">{user.displayName}</div>
                                    <div className="text-xs text-gray-300 uppercase">{userRole}</div>
                                </div>
                            </div>

                            <div className="absolute top-6 right-6 text-right pointer-events-none z-10 hidden sm:block">
                                <h1 className="text-4xl font-black text-white/40 tracking-widest mb-2">BARBERMARK</h1>
                            </div>

                            <div className="absolute bottom-40 right-4 text-right pointer-events-none z-10 md:bottom-24 md:right-8">
                                <p className="text-white text-sm bg-black/50 inline-block px-2 py-1 rounded backdrop-blur-sm mb-1">{currentTime.toLocaleDateString('id-ID')} - {currentTime.toLocaleTimeString('id-ID')}</p><br/>
                                <p className="text-white text-xs bg-black/50 inline-block px-2 py-1 rounded backdrop-blur-sm truncate max-w-[250px]">{location}</p>
                            </div>

                            <button 
                                onClick={takePhoto}
                                className="absolute bottom-[130px] md:bottom-12 z-40 w-20 h-20 bg-white/20 border-4 border-white rounded-full flex items-center justify-center hover:bg-white/40 transition-all active:scale-95 shadow-2xl"
                            >
                                <div className="w-16 h-16 bg-barber-red rounded-full shadow-[0_0_15px_rgba(220,38,38,0.8)]"></div>
                            </button>
                        </>
                    ) : (
                        <div className="w-full h-full flex flex-col items-center justify-center bg-barber-black p-4 text-center z-40 relative">
                            <img src={photoData} alt="Hasil Absen" className="max-h-[60vh] rounded-xl border border-gray-700 shadow-2xl mb-6 object-contain" />
                            <h2 className="text-2xl font-bold text-white mb-2">{statusMsg}</h2>
                            {statusMsg === "Absensi Berhasil!" && <p className="text-gray-400 text-sm">Mengalihkan ke Ruang Absensi...</p>}
                        </div>
                    )}
                    <canvas ref={canvasRef} className="hidden"></canvas>
                </div>
            );
        };

        // --- Komponen Chat ---
        const ChatPage = ({ user, db, collection, onSnapshot, addDoc, appId }) => {
            const [activeRoom, setActiveRoom] = useState('absensi');
            const [messages, setMessages] = useState([]);
            const [inputText, setInputText] = useState("");
            const [uploadingImg, setUploadingImg] = useState(false);
            const [replyingTo, setReplyingTo] = useState(null);
            const [userRole, setUserRole] = useState("");
            const messagesEndRef = useRef(null);

            useEffect(() => {
                const fetchRole = async () => {
                    try {
                        const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'info', 'public');
                        const docSnap = await getDoc(docRef);
                        if (docSnap.exists() && docSnap.data().jobTitle) {
                            setUserRole(docSnap.data().jobTitle);
                        }
                    } catch(e) { console.log("No role"); }
                };
                fetchRole();
            }, [user, db, appId]);

            useEffect(() => {
                if (!user) return;
                const publicRef = collection(db, 'artifacts', appId, 'public', 'data', 'chats');
                
                const unsubscribe = onSnapshot(publicRef, (snapshot) => {
                    const docs = [];
                    snapshot.forEach(doc => {
                        docs.push({ id: doc.id, ...doc.data() });
                    });
                    docs.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
                    setMessages(docs);
                }, (error) => console.error("Gagal mengambil chat:", error));

                return () => unsubscribe();
            }, [user, db, appId]);

            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [messages, activeRoom]);

            const handleSendText = async (e) => {
                e.preventDefault();
                if (!inputText.trim() || activeRoom === 'absensi') return;

                const messagePayload = {
                    roomId: 'diskusi',
                    text: inputText,
                    senderName: user.displayName,
                    senderRole: userRole,
                    senderPhoto: user.photoURL,
                    senderUid: user.uid,
                    timestamp: new Date().toISOString(),
                    type: 'chat'
                };

                if (replyingTo) {
                    messagePayload.replyTo = {
                        id: replyingTo.id,
                        senderName: replyingTo.senderName,
                        text: replyingTo.text || (replyingTo.fileUrl ? "Mengirim File" : "Gambar")
                    };
                }

                try {
                    const publicRef = collection(db, 'artifacts', appId, 'public', 'data', 'chats');
                    await addDoc(publicRef, messagePayload);
                    setInputText("");
                    setReplyingTo(null);
                } catch (err) { console.error("Gagal kirim pesan", err); }
            };

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file || activeRoom === 'absensi') return;

                setUploadingImg(true);
                try {
                    const cloudRes = await uploadToCloudinary(file);
                    const messagePayload = {
                        roomId: 'diskusi',
                        text: file.type.startsWith('video/') ? "Mengirim video" : "Mengirim file",
                        fileUrl: cloudRes.url,
                        resourceType: cloudRes.type,
                        senderName: user.displayName,
                        senderRole: userRole,
                        senderPhoto: user.photoURL,
                        senderUid: user.uid,
                        timestamp: new Date().toISOString(),
                        type: 'chat'
                    };
                    if (replyingTo) {
                        messagePayload.replyTo = { id: replyingTo.id, senderName: replyingTo.senderName, text: replyingTo.text || "Gambar/File" };
                    }
                    const publicRef = collection(db, 'artifacts', appId, 'public', 'data', 'chats');
                    await addDoc(publicRef, messagePayload);
                    setReplyingTo(null);
                } catch (err) {
                    console.error("Gagal kirim file", err);
                    alert("Gagal mengunggah file ke Cloudinary");
                } finally {
                    setUploadingImg(false);
                }
            };

            const displayMessages = messages.filter(m => m.roomId === activeRoom);

            return (
                <div className="flex flex-col h-screen w-full bg-barber-black pt-4 pb-28 md:pb-4 md:pl-28">
                    <div className="flex px-4 mb-4 gap-2 z-10 relative">
                        <button onClick={() => setActiveRoom('absensi')} className={`flex-1 py-3 px-4 rounded-xl font-bold text-sm transition-all ${activeRoom === 'absensi' ? 'bg-barber-red text-white shadow-lg' : 'bg-barber-dark text-gray-400 border border-gray-800 hover:bg-gray-800'}`}>Ruang Absensi</button>
                        <button onClick={() => setActiveRoom('diskusi')} className={`flex-1 py-3 px-4 rounded-xl font-bold text-sm transition-all ${activeRoom === 'diskusi' ? 'bg-barber-red text-white shadow-lg' : 'bg-barber-dark text-gray-400 border border-gray-800 hover:bg-gray-800'}`}>Ruang Diskusi</button>
                    </div>

                    <div className="flex-1 overflow-y-auto px-4 hide-scrollbar flex flex-col gap-4 pb-4">
                        {displayMessages.length === 0 && <div className="flex-1 flex items-center justify-center text-gray-500 text-sm">Belum ada data di ruang ini.</div>}
                        
                        {displayMessages.map((msg) => {
                            const isMe = msg.senderUid === user.uid;
                            const time = new Date(msg.timestamp).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

                            if (activeRoom === 'absensi') {
                                return (
                                    <div key={msg.id} className={`flex w-full mb-4 ${isMe ? 'justify-end' : 'justify-start'}`}>
                                        <div className="bg-barber-dark border border-gray-800 rounded-xl p-3 shadow-md max-w-xs sm:max-w-sm w-full flex gap-3">
                                            <div className="flex-shrink-0">
                                                {msg.senderPhoto ? (<img src={msg.senderPhoto} className="w-10 h-10 rounded-full border border-barber-gray object-cover" alt="Profile" />) : (<div className="w-10 h-10 rounded-full bg-gray-700 flex items-center justify-center text-gray-400"><Icons.User /></div>)}
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                <div className="flex justify-between items-start mb-1">
                                                    <div className="min-w-0">
                                                        <span className="font-bold text-white text-sm block truncate">{msg.senderName}</span>
                                                        <span className="text-[10px] text-barber-red font-semibold uppercase tracking-wide block truncate">{msg.senderRole || 'Staff'}</span>
                                                    </div>
                                                    <span className={`text-[10px] px-2 py-0.5 rounded font-bold whitespace-nowrap ml-2 ${msg.type === 'masuk' ? 'bg-emerald-500/20 text-emerald-400' : msg.type === 'terlambat' ? 'bg-yellow-500/20 text-yellow-400' : 'bg-blue-500/20 text-blue-400'}`}>
                                                        {msg.type === 'masuk' ? 'MASUK' : msg.type === 'terlambat' ? 'TERLAMBAT' : 'PULANG'}
                                                    </span>
                                                </div>
                                                {msg.imageUrl && (<img src={msg.imageUrl} alt="Absen" className="w-full rounded-lg object-cover bg-black mb-2" loading="lazy" />)}
                                                <div className="text-right text-[10px] text-gray-500">{time}</div>
                                            </div>
                                        </div>
                                    </div>
                                );
                            } else {
                                return (
                                    <div key={msg.id} className={`flex gap-2 mb-4 ${isMe ? 'flex-row-reverse' : 'flex-row'} items-end group`}>
                                        {!isMe && (
                                            <div className="w-8 h-8 rounded-full bg-gray-800 border border-gray-600 flex-shrink-0 overflow-hidden">
                                                {msg.senderPhoto ? (<img src={msg.senderPhoto} alt={msg.senderName} className="w-full h-full object-cover" />) : (<div className="w-full h-full flex items-center justify-center text-gray-400"><Icons.User /></div>)}
                                            </div>
                                        )}
                                        <div className={`flex flex-col max-w-[80%] ${isMe ? 'items-end' : 'items-start'}`}>
                                            {!isMe && (
                                                <div className="flex items-baseline gap-2 mb-1 ml-1">
                                                    <span className="text-xs text-gray-300 font-semibold">{msg.senderName}</span>
                                                    <span className="text-[9px] text-barber-red bg-barber-red/10 px-1 py-0.5 rounded">{msg.senderRole || 'Staff'}</span>
                                                </div>
                                            )}
                                            <div className={`p-3 rounded-2xl relative shadow-sm ${isMe ? 'bg-barber-red text-white rounded-tr-sm' : 'bg-barber-dark text-gray-200 border border-gray-800 rounded-tl-sm'}`}>
                                                {msg.replyTo && (
                                                    <div className={`mb-2 p-2 rounded text-xs border-l-4 ${isMe ? 'bg-black/20 border-white' : 'bg-black/30 border-barber-red'}`}>
                                                        <span className="font-bold block text-gray-300">{msg.replyTo.senderName}</span>
                                                        <span className="truncate max-w-[150px] inline-block opacity-80">{msg.replyTo.text}</span>
                                                    </div>
                                                )}
                                                {msg.resourceType === 'video' ? (<video src={msg.fileUrl} controls className="max-w-full rounded-lg mb-2 max-h-60 bg-black"></video>) : msg.fileUrl || msg.imageUrl ? (<img src={msg.fileUrl || msg.imageUrl} className="max-w-full rounded-lg mb-2 max-h-60 object-contain" alt="Upload" loading="lazy"/>) : null}
                                                {msg.text && msg.text !== "Mengirim file" && msg.text !== "Mengirim gambar" && msg.text !== "Mengirim video" && <p className="text-sm">{msg.text}</p>}
                                            </div>
                                            <div className={`flex items-center gap-2 mt-1 ${isMe ? 'justify-end' : 'justify-start'}`}>
                                                {!isMe && <button onClick={() => setReplyingTo(msg)} className="text-gray-600 hover:text-white"><Icons.Reply /></button>}
                                                <span className="text-[10px] text-gray-600">{time}</span>
                                                {isMe && <button onClick={() => setReplyingTo(msg)} className="text-gray-600 hover:text-white"><Icons.Reply /></button>}
                                            </div>
                                        </div>
                                    </div>
                                );
                            }
                        })}
                        <div ref={messagesEndRef} />
                    </div>

                    {activeRoom === 'diskusi' && (
                        <div className="px-4 py-2 bg-barber-black/90 backdrop-blur pb-4">
                            {replyingTo && (
                                <div className="bg-barber-dark border border-gray-700 p-2 rounded-t-xl mb-[-5px] flex justify-between items-center">
                                    <div className="flex flex-col text-xs">
                                        <span className="text-barber-red font-bold">Membalas {replyingTo.senderName}</span>
                                        <span className="text-gray-400 truncate max-w-[250px]">{replyingTo.text || "Gambar/File"}</span>
                                    </div>
                                    <button onClick={() => setReplyingTo(null)} className="text-gray-400 hover:text-white p-1"><Icons.Close /></button>
                                </div>
                            )}
                            <form onSubmit={handleSendText} className="flex gap-2 items-center bg-barber-dark p-2 rounded-full border border-gray-800 z-10 relative">
                                <label className="cursor-pointer p-2 text-gray-400 hover:text-white transition-colors">
                                    <Icons.Image />
                                    <input type="file" accept="image/*,video/*" className="hidden" onChange={handleFileUpload} disabled={uploadingImg}/>
                                </label>
                                <input type="text" value={inputText} onChange={(e) => setInputText(e.target.value)} placeholder={uploadingImg ? "Mengunggah..." : "Ketik pesan..."} className="flex-1 bg-transparent text-sm text-white focus:outline-none px-2" disabled={uploadingImg} />
                                <button type="submit" className="p-2 bg-barber-red text-white rounded-full hover:bg-barber-redDark transition-colors shadow-lg" disabled={!inputText.trim() || uploadingImg}><Icons.Send /></button>
                            </form>
                        </div>
                    )}
                </div>
            );
        };

        // --- Komponen Profil + PWA Installer ---
        const ProfilePage = ({ user, db, collection, onSnapshot, doc, getDoc, setDoc, appId, onLogout }) => {
            const [attendanceData, setAttendanceData] = useState({});
            const [currentDate, setCurrentDate] = useState(new Date());
            const [isEditing, setIsEditing] = useState(false);
            const [newName, setNewName] = useState(user.displayName || "");
            const [newAvatarFile, setNewAvatarFile] = useState(null);
            const [avatarPreview, setAvatarPreview] = useState(user.photoURL);
            const [isSaving, setIsSaving] = useState(false);
            const [jobTitle, setJobTitle] = useState("");
            const jobOptions = ["Capster", "Kasir", "HRD", "CEO", "Wakil CEO", "Bendahara", "Manager", "Manager Marketing", "Marketing", "Staff Bersho"];
            const { updateProfile } = window.firebaseDeps;

            // --- PWA Logic with LocalStorage ---
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [isInstallable, setIsInstallable] = useState(false);
            const [isIOS, setIsIOS] = useState(false);

            useEffect(() => {
                // Cek LocalStorage apakah sudah pernah install/dismiss
                const isInstalled = localStorage.getItem('pwaInstalled');
                const isDismissed = localStorage.getItem('pwaDismissed');
                
                // Deteksi iOS
                const isIos = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
                setIsIOS(isIos);

                // Event listener untuk install prompt (Desktop/Android)
                const handler = (e) => {
                    e.preventDefault();
                    if (!isInstalled && !isDismissed) {
                        setDeferredPrompt(e);
                        setIsInstallable(true);
                    }
                };

                window.addEventListener('beforeinstallprompt', handler);
                return () => window.removeEventListener('beforeinstallprompt', handler);
            }, []);

            const handleInstallClick = async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') {
                        localStorage.setItem('pwaInstalled', 'true');
                        setIsInstallable(false);
                    } else {
                        localStorage.setItem('pwaDismissed', 'true');
                        setIsInstallable(false);
                    }
                    setDeferredPrompt(null);
                }
            };

            const handleDismissIOS = () => {
                localStorage.setItem('pwaDismissed', 'true');
                setIsInstallable(false);
            };

            // --- End PWA Logic ---

            useEffect(() => {
                const privateRef = collection(db, 'artifacts', appId, 'users', user.uid, 'attendance');
                const unsubAttendance = onSnapshot(privateRef, (snapshot) => {
                    const data = {};
                    snapshot.forEach(doc => { data[doc.id] = doc.data(); });
                    setAttendanceData(data);
                });
                const fetchJobTitle = async () => {
                    const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'info', 'public');
                    const docSnap = await getDoc(docRef);
                    if (docSnap.exists() && docSnap.data().jobTitle) setJobTitle(docSnap.data().jobTitle);
                };
                fetchJobTitle();
                return () => unsubAttendance();
            }, [user, db, appId]);

            const handleAvatarChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setNewAvatarFile(file);
                const reader = new FileReader();
                reader.onloadend = () => setAvatarPreview(reader.result);
                reader.readAsDataURL(file);
            };

            const handleSaveProfile = async (e) => {
                e.preventDefault();
                setIsSaving(true);
                try {
                    let updates = { displayName: newName };
                    if (newAvatarFile) {
                        const cloudRes = await uploadToCloudinary(newAvatarFile);
                        updates.photoURL = cloudRes.url;
                    }
                    await updateProfile(user, updates);
                    const infoRef = doc(db, 'artifacts', appId, 'users', user.uid, 'info', 'public');
                    await setDoc(infoRef, { jobTitle: jobTitle, lastUpdated: new Date().toISOString() }, { merge: true });
                    setIsEditing(false);
                    window.location.reload(); 
                } catch (err) {
                    console.error("Gagal menyimpan profil", err);
                    alert("Terjadi kesalahan saat menyimpan profil");
                } finally {
                    setIsSaving(false);
                }
            };

            const getDaysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
            const renderCalendar = () => {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const daysCount = getDaysInMonth(year, month);
                const firstDayIndex = new Date(year, month, 1).getDay(); 
                const days = [];
                for(let i = 0; i < firstDayIndex; i++) days.push(<div key={`empty-${i}`} className="p-2"></div>);
                const todayStr = new Date().toISOString().split('T')[0];
                for(let i = 1; i <= daysCount; i++) {
                    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                    const isToday = dateStr === todayStr;
                    const isPast = new Date(dateStr) < new Date(todayStr);
                    const record = attendanceData[dateStr];
                    let bgColor = 'bg-gray-800/50 text-gray-500';
                    if (record) {
                        if (record.type === 'masuk') bgColor = 'bg-emerald-500 text-white font-bold shadow-md';
                        else if (record.type === 'terlambat') bgColor = 'bg-yellow-500 text-white font-bold shadow-md';
                        else if (record.type === 'pulang') bgColor = 'bg-blue-500 text-white font-bold shadow-md';
                    } else if (isPast) bgColor = 'bg-red-500/30 text-red-300 border border-red-900/50'; 
                    else if (isToday) bgColor = 'bg-gray-700 text-white border-2 border-barber-red';
                    days.push(<div key={i} className={`aspect-square flex items-center justify-center rounded-lg text-xs sm:text-sm ${bgColor}`}>{i}</div>);
                }
                return days;
            };
            const monthNames = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];

            return (
                <div className="flex flex-col min-h-screen w-full bg-barber-black pt-8 px-6 pb-32 md:pb-8 md:pl-32 overflow-y-auto hide-scrollbar">
                    <h1 className="text-3xl font-black text-white mb-8 tracking-tight">Profil Saya</h1>
                    
                    {/* PWA Install Banner (iOS / Android) */}
                    {(isInstallable || (isIOS && !localStorage.getItem('pwaDismissed'))) && (
                        <div className="bg-barber-red/10 border border-barber-red/30 rounded-xl p-4 mb-6 flex items-start justify-between animate-fade-in-up">
                            <div>
                                <h3 className="font-bold text-barber-red text-sm mb-1">Install Aplikasi</h3>
                                {isIOS ? (
                                    <p className="text-xs text-gray-300">Tekan tombol <strong>Share</strong> di browser, lalu pilih <strong>Add to Home Screen</strong>.</p>
                                ) : (
                                    <p className="text-xs text-gray-300">Pasang aplikasi ini di perangkat Anda untuk akses lebih cepat.</p>
                                )}
                            </div>
                            <div className="flex gap-2">
                                {!isIOS && (
                                    <button onClick={handleInstallClick} className="bg-barber-red text-white text-xs px-3 py-2 rounded-lg font-bold flex items-center gap-1">
                                        <Icons.Download /> Install
                                    </button>
                                )}
                                <button onClick={handleDismissIOS} className="text-gray-400 hover:text-white p-1"><Icons.Close /></button>
                            </div>
                        </div>
                    )}

                    {!isEditing ? (
                        <div className="bg-barber-dark rounded-2xl p-6 border border-gray-800 flex items-center justify-between gap-4 mb-8">
                            <div className="flex items-center gap-4">
                                {user.photoURL ? (<img src={user.photoURL} alt="Avatar" className="w-16 h-16 rounded-full border-2 border-barber-red object-cover shadow-[0_0_15px_rgba(220,38,38,0.3)]" />) : (<div className="w-16 h-16 rounded-full bg-gray-700 flex items-center justify-center"><Icons.User /></div>)}
                                <div>
                                    <h2 className="text-xl font-bold text-white">{user.displayName}</h2>
                                    <p className="text-sm text-barber-red font-semibold uppercase mb-1">{jobTitle || 'Belum ada jabatan'}</p>
                                    <p className="text-xs text-gray-400">{user.email}</p>
                                </div>
                            </div>
                            <button onClick={() => setIsEditing(true)} className="p-3 bg-gray-800 text-white rounded-xl hover:bg-gray-700 transition-colors"><Icons.Edit /></button>
                        </div>
                    ) : (
                        <form onSubmit={handleSaveProfile} className="bg-barber-dark rounded-2xl p-6 border border-barber-red mb-8">
                            <div className="flex justify-between items-center mb-4"><h3 className="font-bold text-white">Ubah Profil</h3><button type="button" onClick={() => setIsEditing(false)} className="text-gray-400 hover:text-white"><Icons.Close /></button></div>
                            <div className="flex flex-col items-center mb-6">
                                <label className="relative cursor-pointer group">
                                    <img src={avatarPreview || "https://via.placeholder.com/150"} alt="Avatar Preview" className="w-24 h-24 rounded-full border-2 border-dashed border-gray-500 object-cover group-hover:border-white transition-colors" />
                                    <div className="absolute inset-0 bg-black/60 rounded-full flex flex-col items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"><Icons.Camera /><span className="text-[10px] text-white font-bold mt-1">Ubah Foto</span></div>
                                    <input type="file" accept="image/*" className="hidden" onChange={handleAvatarChange} disabled={isSaving} />
                                </label>
                            </div>
                            <div className="mb-4"><label className="block text-xs text-gray-400 mb-1">Nama Pengguna</label><input type="text" value={newName} onChange={(e) => setNewName(e.target.value)} className="w-full bg-barber-black border border-gray-700 text-white rounded-lg p-3 focus:outline-none focus:border-barber-red transition-colors" disabled={isSaving} required /></div>
                            <div className="mb-6"><label className="block text-xs text-gray-400 mb-1">Jabatan</label><div className="relative"><select value={jobTitle} onChange={(e) => setJobTitle(e.target.value)} className="w-full bg-barber-black border border-gray-700 text-white rounded-lg p-3 focus:outline-none focus:border-barber-red transition-colors appearance-none" disabled={isSaving}><option value="">-- Pilih Jabatan --</option>{jobOptions.map(opt => (<option key={opt} value={opt}>{opt}</option>))}</select><div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-400"><svg className="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg></div></div></div>
                            <button type="submit" disabled={isSaving} className="w-full bg-barber-red text-white font-bold py-3 rounded-lg hover:bg-barber-redDark transition-colors">{isSaving ? "Menyimpan..." : "Simpan Perubahan"}</button>
                        </form>
                    )}
                    <div className="bg-barber-dark rounded-2xl p-6 border border-gray-800 mb-8 shadow-lg">
                        <div className="flex justify-between items-center mb-6"><h3 className="font-bold text-white">Kalender Absensi</h3><span className="text-sm font-bold bg-barber-red/20 text-barber-red px-3 py-1 rounded-full">{monthNames[currentDate.getMonth()]} {currentDate.getFullYear()}</span></div>
                        <div className="flex flex-wrap gap-4 mb-6 text-xs bg-barber-black p-3 rounded-xl border border-gray-800"><div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]"></div> Masuk</div><div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-yellow-500 shadow-[0_0_8px_rgba(234,179,8,0.5)]"></div> Terlambat</div><div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full border-2 border-red-900 bg-red-500/30"></div> Tidak Absen</div></div>
                        <div className="grid grid-cols-7 gap-1 sm:gap-2 mb-2 text-center text-xs text-gray-500 font-bold"><div>Min</div><div>Sen</div><div>Sel</div><div>Rab</div><div>Kam</div><div>Jum</div><div>Sab</div></div>
                        <div className="grid grid-cols-7 gap-1 sm:gap-2">{renderCalendar()}</div>
                    </div>
                    <button onClick={onLogout} className="w-full bg-red-900/10 text-red-500 border border-red-900/30 hover:bg-red-900/30 hover:text-white py-4 rounded-xl font-bold flex items-center justify-center gap-2 transition-all mt-auto"><Icons.LogOut /> Keluar Akun</button>
                </div>
            );
        };

        // --- Main App Component ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [view, setView] = useState('chat');
            const { auth, db, provider, signInWithPopup, onAuthStateChanged, signOut, collection, onSnapshot, addDoc, doc, setDoc, appId, getDoc } = window.firebaseDeps;

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    if (currentUser && !currentUser.isAnonymous) setUser(currentUser);
                    else if (currentUser && currentUser.isAnonymous) { signOut(auth).then(() => setUser(null)); }
                    else setUser(null);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, [auth, signOut]);

            const handleLogin = async () => { try { await signInWithPopup(auth, provider); } catch (error) { console.error("Login failed", error); alert("Gagal login dengan Google."); } };
            const handleLogout = async () => { try { await signOut(auth); } catch (error) { console.error("Logout failed", error); } };

            useEffect(() => { if (user) anime({ targets: '.nav-item', scale: [0.9, 1], opacity: [0, 1], delay: anime.stagger(100), easing: 'easeOutElastic(1, .8)' }); }, [user]);

            if (loading) return <div className="h-screen flex items-center justify-center bg-barber-black text-white font-bold">Memuat Barbermark...</div>;
            if (!user) return <Login onLogin={handleLogin} />;

            return (
                <div className="relative h-screen w-full bg-barber-black overflow-hidden flex">
                    <div className="flex-1 h-full relative overflow-y-auto hide-scrollbar z-0">
                        {view === 'chat' && <ChatPage user={user} db={db} collection={collection} onSnapshot={onSnapshot} addDoc={addDoc} appId={appId} />}
                        {view === 'camera' && <CameraPage user={user} db={db} addDoc={addDoc} collection={collection} doc={doc} setDoc={setDoc} appId={appId} onNavChange={setView} />}
                        {view === 'profile' && <ProfilePage user={user} db={db} collection={collection} onSnapshot={onSnapshot} doc={doc} setDoc={setDoc} getDoc={getDoc} appId={appId} onLogout={handleLogout} />}
                    </div>
                    <nav className="glass-nav fixed bottom-4 left-4 right-4 md:left-6 md:top-1/2 md:-translate-y-1/2 md:w-20 md:bottom-auto md:right-auto md:h-auto rounded-3xl p-2 md:p-3 z-50 flex md:flex-col justify-around md:justify-center md:gap-8 items-center shadow-2xl">
                        <button onClick={() => setView('chat')} className="nav-item p-3 rounded-2xl flex flex-col items-center gap-1 text-gray-500 hover:text-white transition-colors relative"><div className={`${view === 'chat' ? 'text-barber-red' : ''}`}><Icons.Chat /></div>{view === 'chat' && <div className="absolute -bottom-1 md:-right-2 md:bottom-auto w-1.5 h-1.5 bg-barber-red rounded-full"></div>}</button>
                        <button onClick={() => setView('camera')} className="nav-item p-4 bg-barber-red text-white rounded-2xl shadow-[0_4px_15px_rgba(220,38,38,0.5)] transform -translate-y-2 md:-translate-y-0 md:translate-x-2 active:scale-95 transition-transform"><Icons.Camera /></button>
                        <button onClick={() => setView('profile')} className="nav-item p-3 rounded-2xl flex flex-col items-center gap-1 text-gray-500 hover:text-white transition-colors relative"><div className={`${view === 'profile' ? 'text-barber-red' : ''}`}><Icons.User /></div>{view === 'profile' && <div className="absolute -bottom-1 md:-right-2 md:bottom-auto w-1.5 h-1.5 bg-barber-red rounded-full"></div>}</button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
